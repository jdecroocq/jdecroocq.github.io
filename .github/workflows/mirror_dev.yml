name: Mirror the dev branch to the dev repository

on:
  push:
    branches:
      - dev

jobs:
  push_to_mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: 'dev'

      - name: Verifier si le secret est accessible
        run: |
          if [ -n "${{ secrets.ACCESS_TOKEN }}" ]; then
            echo "✅ Le secret ACCESS_TOKEN est bien présent."
          else
            echo "❌ ERREUR : Le secret ACCESS_TOKEN est INTROUVABLE ou VIDE."
            exit 1 # Fait échouer l'action immédiatement
          fi

      - name: Push to dev repository
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          repository: jdecroocq/dev
          branch: main
          force: true

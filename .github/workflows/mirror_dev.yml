name: Miroir de DEV vers le dépôt DEV

on:
  push:
    branches:
      - dev

jobs:
  push_to_mirror:
    runs-on: ubuntu-latest
    steps:
      # Étape 1 : Récupérer le code SANS configurer les identifiants Git par défaut
      - name: Checkout code from dev branch
        uses: actions/checkout@v3
        with:
          ref: 'dev'
          fetch-depth: 0
          # CETTE LIGNE EST LA CORRECTION CRUCIALE
          persist-credentials: false

      # Étape 2 : Pousser vers le dépôt miroir en utilisant explicitement TON jeton
      - name: Push to dev repository
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/jdecroocq/dev.git
          git push --force origin dev:main

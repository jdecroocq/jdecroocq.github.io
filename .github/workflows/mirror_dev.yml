name: Mirror of the dev branch to the dev repository

on:
  push:
    branches:
      - dev

jobs:
  push_to_mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code from dev branch
        uses: actions/checkout@v3
        with:
          ref: 'dev'
          fetch-depth: 0
          persist-credentials: false

      - name: Push to dev repository
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/jdecroocq/dev.git
          git push --force origin dev:main

name: Mirror branches to separate repos

on:
  push:
    branches-ignore:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Mirror branch to another repo
        env:
          PAT_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          USERNAME: jdecroocq
        run: |
          TARGET_REPO="${USERNAME}/${BRANCH_NAME}"
          echo "Pushing branch '${BRANCH_NAME}' to repo '${TARGET_REPO}' on main..."
          git remote add target "https://${USERNAME}:${PAT_TOKEN}@github.com/${TARGET_REPO}.git"
          git push --force target "${BRANCH_NAME}:main"

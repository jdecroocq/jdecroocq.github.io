name: Deploy Preview Sites

on:
  push:
    branches:
      - main
      - dev
      - content

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: ${{ github.ref_name == 'main' && '.' || github.ref_name }}
